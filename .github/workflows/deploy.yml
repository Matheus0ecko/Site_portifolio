name: Deploy para Azure Blob Storage

on:
  push:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pela aba Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Build (gera a pasta dist/)
        run: npm run build

      - name: Enviar dist/ para o container $web
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --destination '$web' \
              --source dist \
              --overwrite
